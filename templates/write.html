<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Admin — Write Article</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <style>
    :root {
      --bg: #F5F6F7;
      --bg-white: #ffffff;
      --text: #2B2E33;
      --text-secondary: #7B7F85;
      --accent: #1A56DB;
      --accent-light: #3B82F6;
      --accent-glow: rgba(26, 86, 219, 0.15);
      --border: #E4E6EA;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
      --transition: 0.3s ease;
      --font-head: 'Playfair Display', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text);
      min-height: 100vh;
      padding: 36px 20px 80px;
    }

    /* ── Layout ─────────────────────────────────────────── */
    .editor-wrap {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Page Header ─────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .page-header-left h1 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.4px;
      line-height: 1.2;
    }

    .page-header-left p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 5px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      border: none;
      outline: none;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-draft {
      background: var(--bg-white);
      color: var(--text);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .btn-draft:hover {
      background: var(--bg);
      border-color: #c4c8cf;
    }
    .btn-draft:active { transform: scale(0.97); }

    .btn-publish {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(26,86,219,0.35);
    }
    .btn-publish:hover { background: #1548c0; box-shadow: 0 6px 20px rgba(26,86,219,0.45); }
    .btn-publish:active { transform: scale(0.97); }
    .btn-publish:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 26px 28px;
      margin-bottom: 18px;
      border: 1px solid rgba(228,230,234,0.6);
    }

    .field-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .field-label i { font-size: 15px; color: var(--accent); }

    /* ── Title Input ─────────────────────────────────────── */
    .title-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 18px;
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }
    .title-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      background: var(--bg-white);
    }
    .title-input::placeholder {
      color: #b8bcc3;
      font-weight: 400;
      font-family: var(--font-body);
      font-size: 16px;
    }

    /* ── Image Upload ────────────────────────────────────── */
    .image-upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .image-upload-zone:hover {
      border-color: var(--accent);
      background: rgba(26,86,219,0.03);
    }
    .image-upload-zone.has-image {
      padding: 0;
      border-style: solid;
      border-color: var(--border);
    }
    .image-upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .upload-prompt .upload-icon {
      font-size: 36px;
      color: var(--accent);
      margin-bottom: 10px;
      display: block;
    }
    .upload-prompt .upload-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .upload-prompt .upload-text strong { color: var(--accent); }
    .upload-prompt .upload-hint {
      font-size: 12px;
      color: #b8bcc3;
      margin-top: 4px;
    }
    #imagePreview {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: calc(var(--radius-sm) - 2px);
      display: none;
    }
    .image-remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 3;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: var(--font-body);
      font-weight: 500;
      color: #e53e3e;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 4px;
      transition: background 0.15s;
    }
    .image-remove-btn:hover { background: #fff5f5; }
    .image-remove-btn i { font-size: 13px; }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      border: 1.5px solid var(--border);
      border-bottom: none;
      flex-wrap: wrap;
      row-gap: 6px;
    }

    .tb-btn {
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-family: var(--font-body);
      line-height: 1;
    }
    .tb-btn:hover { background: var(--border); }
    .tb-btn:active { background: var(--accent-glow); color: var(--accent); }
    .tb-btn i { font-size: 17px; pointer-events: none; }

    .tb-sep {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 5px;
      flex-shrink: 0;
    }

    .tb-select {
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 5px 10px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg-white);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .tb-select:focus { border-color: var(--accent); }

    /* ── Content Editor ──────────────────────────────────── */
    .content-editor {
      min-height: 360px;
      border: 1.5px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      padding: 22px 24px;
      font-size: 16px;
      line-height: 1.85;
      color: var(--text);
      outline: none;
      background: var(--bg-white);
      transition: border-color 0.2s;
    }
    .content-editor:focus { border-color: var(--accent); }
    .content-editor:empty::before {
      content: attr(data-placeholder);
      color: #b8bcc3;
      pointer-events: none;
    }
    .content-editor h2 {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 700;
      margin: 22px 0 10px;
      color: var(--text);
      line-height: 1.3;
    }
    .content-editor h3 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 600;
      margin: 18px 0 8px;
      color: var(--text);
    }
    .content-editor h4 {
      font-size: 17px;
      font-weight: 600;
      margin: 14px 0 6px;
      color: var(--text);
    }
    .content-editor p { margin-bottom: 12px; }
    .content-editor ul, .content-editor ol {
      padding-left: 22px;
      margin-bottom: 12px;
    }
    .content-editor li { margin-bottom: 5px; }
    .content-editor strong { font-weight: 700; }
    .content-editor em { font-style: italic; }
    .content-editor u { text-decoration: underline; }
    .content-editor a { color: var(--accent); text-decoration: underline; }
    .content-editor blockquote {
      border-left: 4px solid var(--accent);
      padding: 10px 18px;
      background: var(--accent-glow);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 14px 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* ── Tags ────────────────────────────────────────────── */
    .tags-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .tag-text-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .tag-text-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      background: var(--bg-white);
    }
    .tag-text-input::placeholder { color: #b8bcc3; }

    .btn-add-tag {
      padding: 10px 20px;
      background: rgba(26,86,219,0.08);
      color: var(--accent);
      border: 1.5px solid rgba(26,86,219,0.22);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn-add-tag:hover { background: rgba(26,86,219,0.14); border-color: rgba(26,86,219,0.35); }
    .btn-add-tag i { font-size: 15px; }

    .tags-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 36px;
    }
    .tags-empty {
      font-size: 13px;
      color: #b8bcc3;
      font-style: italic;
      align-self: center;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(26,86,219,0.07);
      color: var(--accent);
      border: 1.5px solid rgba(26,86,219,0.2);
      border-radius: 999px;
      padding: 5px 12px 5px 10px;
      font-size: 13px;
      font-weight: 500;
      animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .tag-pill i { font-size: 12px; }
    .tag-pill button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 14px;
      padding: 0;
      line-height: 1;
      opacity: 0.6;
      display: flex;
      align-items: center;
      transition: opacity 0.15s;
    }
    .tag-pill button:hover { opacity: 1; }

    /* ── Footer Actions ──────────────────────────────────── */
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding-top: 8px;
    }

    /* ── Word Count ──────────────────────────────────────── */
    .editor-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding: 0 2px;
    }
    .word-count {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .read-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── Toast Notifications ─────────────────────────────── */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      min-width: 320px;
      max-width: 420px;
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 18px 20px;
      position: relative;
      overflow: hidden;
      pointer-events: all;
      animation: toastIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .toast::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .toast.success::before { background: #22c55e; }
    .toast.draft::before { background: #f59e0b; }
    .toast.error::before { background: #ef4444; }

    .toast-icon {
      font-size: 24px;
      flex-shrink: 0;
      margin-top: 1px;
      margin-left: 6px;
    }
    .toast.success .toast-icon { color: #22c55e; }
    .toast.draft .toast-icon { color: #f59e0b; }
    .toast.error .toast-icon { color: #ef4444; }

    .toast-body { flex: 1; }
    .toast-title {
      font-weight: 600;
      font-size: 14.5px;
      color: var(--text);
      margin-bottom: 4px;
    }
    .toast-msg {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .toast-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 18px;
      padding: 0;
      line-height: 1;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .toast-close:hover { color: var(--text); }

    .toast-progress {
      position: absolute;
      bottom: 0;
      left: 4px;
      right: 0;
      height: 3px;
      border-radius: 0;
    }
    .toast.success .toast-progress { background: #22c55e; }
    .toast.draft .toast-progress { background: #f59e0b; }
    .toast.error .toast-progress { background: #ef4444; }

    .toast.hide {
      animation: toastOut 0.28s ease forwards;
    }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
    }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(70px) scale(0.93); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(70px) scale(0.93); }
    }
    @keyframes shrinkBar {
      from { width: calc(100% - 4px); }
      to   { width: 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 20px 12px 60px; }
      .page-header { flex-direction: column; }
      .header-actions { width: 100%; }
      .header-actions .btn { flex: 1; justify-content: center; }
      .card { padding: 18px 16px; }
      .footer-actions { flex-direction: column-reverse; }
      .footer-actions .btn { width: 100%; justify-content: center; }
      .toast { min-width: 280px; max-width: calc(100vw - 32px); }
      .toast-container { left: 16px; right: 16px; }
    }
  </style>
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <div class="editor-wrap">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-left">
        <h1>Write New Article</h1>
        <p>Craft, preview, and publish your blog post</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-draft" onclick="submitPost('draft')">
          <i class="ti ti-device-floppy"></i> Save Draft
        </button>
        <button class="btn btn-publish" id="publishBtnTop" onclick="submitPost('published')">
          <i class="ti ti-send"></i> Publish
        </button>
      </div>
    </div>

    <!-- Title -->
    <div class="card">
      <div class="field-label">
        <i class="ti ti-heading"></i> Article Title
      </div>
      <input
        type="text"
        class="title-input"
        id="postTitle"
        placeholder="Enter a compelling headline…"
        autocomplete="off"
      />
    </div>

    <!-- Cover Image -->
    <div class="card">
      <div class="field-label">
        <i class="ti ti-photo"></i> Cover Image
      </div>
      <div class="image-upload-zone" id="dropZone">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)" />
        <div class="upload-prompt" id="uploadPrompt">
          <span class="upload-icon"><i class="ti ti-cloud-upload"></i></span>
          <div class="upload-text">
            <strong>Click to upload</strong> or drag &amp; drop
          </div>
          <div class="upload-hint">PNG, JPG, WEBP, GIF — max 10MB</div>
        </div>
        <img id="imagePreview" alt="Cover image preview" />
        <button class="image-remove-btn" id="imageRemoveBtn" onclick="removeImage(event)" type="button">
          <i class="ti ti-trash"></i> Remove
        </button>
      </div>
    </div>

    <!-- Body Editor -->
    <div class="card">
      <div class="field-label">
        <i class="ti ti-article"></i> Body Content
      </div>

      <div class="toolbar" id="toolbar">
        <!-- Block format -->
        <select class="tb-select" id="formatSelect" onchange="applyFormat(this.value)" title="Text style">
          <option value="p">Paragraph</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="h4">Heading 4</option>
          <option value="blockquote">Quote</option>
        </select>

        <div class="tb-sep"></div>

        <!-- Inline formatting -->
        <button class="tb-btn" onclick="execCmd('bold')" title="Bold (Ctrl+B)"><strong>B</strong></button>
        <button class="tb-btn" onclick="execCmd('italic')" title="Italic (Ctrl+I)"><em style="font-style:italic">I</em></button>
        <button class="tb-btn" onclick="execCmd('underline')" title="Underline (Ctrl+U)"><u>U</u></button>
        <button class="tb-btn" onclick="execCmd('strikeThrough')" title="Strikethrough"><s style="font-size:13px">S</s></button>

        <div class="tb-sep"></div>

        <!-- Lists -->
        <button class="tb-btn" onclick="execCmd('insertUnorderedList')" title="Bullet list">
          <i class="ti ti-list"></i>
        </button>
        <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="Numbered list">
          <i class="ti ti-list-numbers"></i>
        </button>

        <div class="tb-sep"></div>

        <!-- Align -->
        <button class="tb-btn" onclick="execCmd('justifyLeft')" title="Align left">
          <i class="ti ti-align-left"></i>
        </button>
        <button class="tb-btn" onclick="execCmd('justifyCenter')" title="Align center">
          <i class="ti ti-align-center"></i>
        </button>
        <button class="tb-btn" onclick="execCmd('justifyRight')" title="Align right">
          <i class="ti ti-align-right"></i>
        </button>

        <div class="tb-sep"></div>

        <!-- Link -->
        <button class="tb-btn" onclick="insertLink()" title="Insert link">
          <i class="ti ti-link"></i>
        </button>

        <div class="tb-sep"></div>

        <!-- History -->
        <button class="tb-btn" onclick="execCmd('undo')" title="Undo (Ctrl+Z)">
          <i class="ti ti-arrow-back-up"></i>
        </button>
        <button class="tb-btn" onclick="execCmd('redo')" title="Redo (Ctrl+Y)">
          <i class="ti ti-arrow-forward-up"></i>
        </button>

        <div class="tb-sep"></div>

        <!-- Clear -->
        <button class="tb-btn" onclick="clearFormat()" title="Clear formatting" style="color:#e53e3e">
          <i class="ti ti-clear-formatting"></i>
        </button>
      </div>

      <div
        class="content-editor"
        id="editor"
        contenteditable="true"
        data-placeholder="Start writing your article here… Use the toolbar above to add headings, bold text, and lists."
        oninput="updateWordCount()"
      ></div>

      <div class="editor-meta">
        <span class="word-count" id="wordCount">0 words</span>
        <span class="read-time" id="readTime">~0 min read</span>
      </div>
    </div>

    <!-- Tags -->
    <div class="card">
      <div class="field-label">
        <i class="ti ti-tag"></i> Tags
      </div>
      <div class="tags-row">
        <input
          type="text"
          class="tag-text-input"
          id="tagInput"
          placeholder="Add a tag (e.g. technology, design, tutorial)…"
          onkeydown="if(event.key === 'Enter'){ event.preventDefault(); addTag(); }"
          autocomplete="off"
          maxlength="30"
        />
        <button class="btn-add-tag" onclick="addTag()">
          <i class="ti ti-plus"></i> Add Tag
        </button>
      </div>
      <div class="tags-cloud" id="tagsCloud">
        <span class="tags-empty" id="tagsEmpty">No tags added yet</span>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="footer-actions">
      <button class="btn btn-draft" onclick="submitPost('draft')">
        <i class="ti ti-device-floppy"></i> Save as Draft
      </button>
      <button class="btn btn-publish" id="publishBtnBottom" onclick="submitPost('published')">
        <i class="ti ti-send"></i> Publish Now
      </button>
    </div>

  </div><!-- /.editor-wrap -->


  <script>
    /* ────────────────────────────────────────────────────────
       State
    ──────────────────────────────────────────────────────── */
    let tags = [];
    let imageBase64 = null;

    /* ────────────────────────────────────────────────────────
       Rich Text Commands
    ──────────────────────────────────────────────────────── */
    function execCmd(cmd, value = null) {
      document.getElementById('editor').focus();
      document.execCommand(cmd, false, value);
    }

    function applyFormat(tag) {
      if (!tag) return;
      const editor = document.getElementById('editor');
      editor.focus();
      if (tag === 'blockquote') {
        document.execCommand('formatBlock', false, 'blockquote');
      } else {
        document.execCommand('formatBlock', false, tag);
      }
      // Reset dropdown after applying
      setTimeout(() => {
        document.getElementById('formatSelect').value = 'p';
      }, 100);
    }

    function clearFormat() {
      execCmd('removeFormat');
      execCmd('formatBlock', 'p');
    }

    function insertLink() {
      const url = prompt('Enter URL:', 'https://');
      if (url) execCmd('createLink', url);
    }

    /* ────────────────────────────────────────────────────────
       Word Count
    ──────────────────────────────────────────────────────── */
    function updateWordCount() {
      const text = document.getElementById('editor').innerText.trim();
      const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
      const mins = Math.max(1, Math.ceil(words / 200));
      document.getElementById('wordCount').textContent = words + (words === 1 ? ' word' : ' words');
      document.getElementById('readTime').textContent = '~' + mins + ' min read';
    }

    /* ────────────────────────────────────────────────────────
       Image Upload
    ──────────────────────────────────────────────────────── */
    function handleImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) {
        showToast('error', 'File too large', 'Please select an image under 10MB.');
        return;
      }
      const reader = new FileReader();
      reader.onload = function(ev) {
        imageBase64 = ev.target.result;
        const preview = document.getElementById('imagePreview');
        const prompt  = document.getElementById('uploadPrompt');
        const zone    = document.getElementById('dropZone');
        const rmBtn   = document.getElementById('imageRemoveBtn');
        preview.src = imageBase64;
        preview.style.display = 'block';
        prompt.style.display  = 'none';
        zone.classList.add('has-image');
        rmBtn.style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }

    function removeImage(e) {
      e.stopPropagation();
      imageBase64 = null;
      const preview = document.getElementById('imagePreview');
      const prompt  = document.getElementById('uploadPrompt');
      const zone    = document.getElementById('dropZone');
      const rmBtn   = document.getElementById('imageRemoveBtn');
      const input   = document.getElementById('imageInput');
      preview.src = '';
      preview.style.display = 'none';
      prompt.style.display  = '';
      zone.classList.remove('has-image');
      rmBtn.style.display = 'none';
      input.value = '';
    }

    /* ────────────────────────────────────────────────────────
       Tags
    ──────────────────────────────────────────────────────── */
    function addTag() {
      const input = document.getElementById('tagInput');
      const raw = input.value.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '');
      if (!raw) { input.focus(); return; }
      if (tags.includes(raw)) {
        showToast('error', 'Duplicate tag', '"' + raw + '" is already added.');
        input.value = '';
        return;
      }
      if (tags.length >= 10) {
        showToast('error', 'Tag limit reached', 'You can add up to 10 tags per article.');
        return;
      }
      tags.push(raw);
      renderTags();
      input.value = '';
      input.focus();
    }

    function removeTag(t) {
      tags = tags.filter(x => x !== t);
      renderTags();
    }

    function renderTags() {
      const cloud = document.getElementById('tagsCloud');
      const empty = document.getElementById('tagsEmpty');
      if (tags.length === 0) {
        cloud.innerHTML = '';
        cloud.appendChild(empty);
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      cloud.innerHTML = tags.map(t => `
        <span class="tag-pill">
          <i class="ti ti-hash"></i>${t}
          <button onclick="removeTag('${t}')" aria-label="Remove tag ${t}">
            <i class="ti ti-x"></i>
          </button>
        </span>
      `).join('');
      cloud.appendChild(empty);
    }

    /* ────────────────────────────────────────────────────────
       Submit (Draft / Publish)
    ──────────────────────────────────────────────────────── */
    
   async function submitPost(status) {

  const title = document.getElementById('postTitle').value.trim();
  const body = document.getElementById('editor').innerHTML.trim();
  const plain = document.getElementById('editor').innerText.trim();

  if (!title) {
    showToast('error', 'Missing title', 'Please enter an article title before continuing.');
    document.getElementById('postTitle').focus();
    return;
  }

  if (!plain) {
    showToast('error', 'Empty body', 'Please write some content before saving.');
    document.getElementById('editor').focus();
    return;
  }

  setLoading(true, status);

  const payload = {
    title,
    body_html: body,
    body_text: plain,
    tags,
    status,
    cover_image: imageBase64 || null,
    word_count: plain.split(/\s+/).filter(Boolean).length,
    created_at: new Date().toISOString(),
    slug: title
      .toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^a-z0-9\-]/g, '')
  };

  try {

    const response = await fetch('/api/posts', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.message || 'Server Error');
    }

    console.log(result);

    if (status === 'published') {

      showToast(
        'success',
        'Article published! 🎉',
        `"${title}" is now live.`
      );

    } else {

      showToast(
        'draft',
        'Draft saved',
        `"${title}" saved as draft.`
      );
    }

  } catch (err) {

    console.error(err);

    showToast(
      'error',
      'Something went wrong',
      err.message || 'Server error'
    );

  } finally {

    setLoading(false, status);

  }
}


    function setLoading(loading, status) {
      const btnIds = ['publishBtnTop', 'publishBtnBottom'];
      if (status === 'published') {
        btnIds.forEach(id => {
          const btn = document.getElementById(id);
          if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Publishing…';
          } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="ti ti-send"></i> Publish';
          }
        });
      }
    }

    /* ────────────────────────────────────────────────────────
       Toast Notifications
    ──────────────────────────────────────────────────────── */
    const toastIcons = {
      success: 'ti-circle-check',
      draft:   'ti-clock',
      error:   'ti-alert-circle'
    };

    function showToast(type, title, msg, duration = 4000) {
      const container = document.getElementById('toastContainer');
      const id = 'toast_' + Date.now() + '_' + Math.random().toString(36).slice(2);

      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.id = id;
      el.setAttribute('role', 'alert');
      el.innerHTML = `
        <div class="toast-icon"><i class="ti ${toastIcons[type]}"></i></div>
        <div class="toast-body">
          <div class="toast-title">${title}</div>
          <div class="toast-msg">${msg}</div>
        </div>
        <button class="toast-close" onclick="dismissToast('${id}')" aria-label="Dismiss notification">
          <i class="ti ti-x"></i>
        </button>
        <div class="toast-progress" style="animation: shrinkBar ${duration}ms linear forwards;"></div>
      `;
      container.appendChild(el);

      setTimeout(() => dismissToast(id), duration);
    }

    function dismissToast(id) {
      const el = document.getElementById(id);
      if (!el || el.classList.contains('hide')) return;
      el.classList.add('hide');
      setTimeout(() => el && el.remove(), 320);
    }

    /* ────────────────────────────────────────────────────────
       Drag & Drop on Image Zone
    ──────────────────────────────────────────────────────── */
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--accent)';
      dropZone.style.background  = 'rgba(26,86,219,0.05)';
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '';
      dropZone.style.background  = '';
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.style.borderColor = '';
      dropZone.style.background  = '';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        document.getElementById('imageInput').files = e.dataTransfer.files;
        handleImage({ target: { files: [file] } });
      } else {
        showToast('error', 'Invalid file', 'Please drop an image file (PNG, JPG, WEBP, GIF).');
      }
    });

    /* ────────────────────────────────────────────────────────
       Keyboard shortcuts
    ──────────────────────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        submitPost('draft');
      }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'P') {
        e.preventDefault();
        submitPost('published');
      }
    });
  </script>

</body>
</html>
